# Define o tipo de banco de dados
quarkus.datasource.db-kind=postgresql

# Configura as credenciais do seu banco de dados existente
quarkus.datasource.username=postgres
quarkus.datasource.password=renato

# Configura a URL de conexão (ajuste o host, a porta e o nome do banco)
quarkus.datasource.jdbc.url=jdbc:postgresql://database:5432/petshop

# Atualiza a estrutura apenas se necessário, mantendo os dados intactos
quarkus.hibernate-orm.database.generation=update

# Configuração do Cliente REST da Dog CEO
dog-ceo-api/mp-rest/url=https://dog.ceo

# Habilitando recurso de logs
quarkus.log.console.json=true

# 1. Liga o log de SQL no console
quarkus.hibernate-orm.log.sql=true

# 2. Formata o SQL para ficar com quebras de linha e fácil de ler no Portainer
quarkus.hibernate-orm.log.format-sql=true

# 3. A MÁGICA: Em vez de mostrar "breed = ?", ele mostra o valor real "breed = 'pug'"
quarkus.hibernate-orm.log.bind-parameters=true